<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="refresh" content="0; url=https://bridge.injective.network/">
  <link rel="canonical" href="https://bridge.injective.network/">
  <title>USDC Bridge Deprecated</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: #0b111c;
      --line: rgba(105, 214, 255, 0.28);
      --text: #eef7ff;
      --muted: #9fb2c7;
      --cyan: #22d3ee;
      --blue: #4f8cff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.18), transparent 34rem),
        linear-gradient(180deg, #08111f 0%, var(--bg) 58%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(28px, 8vw, 48px);
      background: linear-gradient(180deg, rgba(12, 19, 31, 0.96), rgba(7, 11, 18, 0.96));
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.45);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--cyan);
      font: 700 12px/1.4 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 52px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    p {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      margin-top: 28px;
      padding: 0 18px;
      border: 1px solid rgba(34, 211, 238, 0.64);
      border-radius: 6px;
      color: #001018;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
    }

    a:focus-visible {
      outline: 3px solid rgba(34, 211, 238, 0.45);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Deprecated tool</p>
    <h1>Use Injective Bridge</h1>
    <p>
      The standalone USDC widget has been retired. You are being redirected to the official Injective Bridge.
    </p>
    <a href="https://bridge.injective.network/">Open Injective Bridge</a>
  </main>
  <script>
    window.location.replace('https://bridge.injective.network/');
  </script>
</body>
</html>
